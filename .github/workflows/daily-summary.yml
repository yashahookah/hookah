name: Daily Telegram Analytics

on:
  schedule:
    # Запуск каждый день в 10:30 МСК (7:30 UTC)
    - cron: '30 7 * * *'
  workflow_dispatch:  # Для ручного запуска из интерфейса GitHub

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_telegram.txt
      
      - name: Download session file (if exists)
        uses: actions/download-artifact@v4
        with:
          name: telegram-session
          path: .
          if-no-files-found: ignore
        continue-on-error: true
      
      - name: Check secrets availability
        run: |
          echo "Проверка секретов..."
          if [ -z "${{ secrets.TELEGRAM_API_ID }}" ]; then
            echo "❌ TELEGRAM_API_ID не установлен в секретах"
            exit 1
          else
            echo "✅ TELEGRAM_API_ID найден в секретах"
          fi
          if [ -z "${{ secrets.TELEGRAM_API_HASH }}" ]; then
            echo "❌ TELEGRAM_API_HASH не установлен в секретах"
            exit 1
          else
            echo "✅ TELEGRAM_API_HASH найден в секретах"
          fi
      
      - name: Run Telegram Analytics
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          echo "Проверка переменных окружения..."
          echo "API_ID установлен: $([ -n "$TELEGRAM_API_ID" ] && echo 'да' || echo 'нет')"
          echo "API_HASH установлен: $([ -n "$TELEGRAM_API_HASH" ] && echo 'да' || echo 'нет')"
          if [ -z "$TELEGRAM_API_ID" ] || [ -z "$TELEGRAM_API_HASH" ]; then
            echo "❌ Переменные окружения не установлены!"
            echo "Проверь секреты в Settings → Secrets → Actions"
            exit 1
          fi
          python3 telegram_daily_summary_complete.py --test
        continue-on-error: true
      
      - name: Save session file
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telegram-session
          path: telegram_summary_session.session
          retention-days: 90
          if-no-files-found: ignore
        continue-on-error: true
      
      - name: Upload summary files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-files
          path: |
            summaries/*.md
            *.json
          retention-days: 30
